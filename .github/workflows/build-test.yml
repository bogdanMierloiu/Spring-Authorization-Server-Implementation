name: Build and Test

on: [push]  # Start pipeline on push

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # Use Ubuntu as the runner OS

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: 17

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Run tests
        run: mvn test
