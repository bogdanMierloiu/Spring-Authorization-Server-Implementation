name: Build and Test

on:
  push:
    paths-ignore:
      - 'README.md'
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java version
        uses: actions/setup-java@v1
        with:
            java-version: '17'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Run tests
        run: mvn test

